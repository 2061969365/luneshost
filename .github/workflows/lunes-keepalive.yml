name: Lunes Host Daily KeepAlive

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 关键修改：在这里加上 requests 依赖库安装
          pip install playwright requests
          playwright install chromium

      - name: Run check script
        env:
          LUNES_SERVER_URL: ${{ secrets.LUNES_SERVER_URL }}
          LUNES_COOKIES: ${{ secrets.LUNES_COOKIES }}
          # 传入 TG 环境变量
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python lunes_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-debug-screenshot
          path: lunes_debug_screenshot.png
          if-no-files-found: ignore
