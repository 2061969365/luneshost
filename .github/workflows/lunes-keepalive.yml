name: Lunes Host Daily KeepAlive

on:
  schedule:
    # 每天北京时间下午 4:30 自动执行一次保活打卡
    - cron: '30 8 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 核心改变：安装 seleniumbase 代替 playwright
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.1

      - name: Run check script
        env:
          LUNES_SERVER_URL: ${{ secrets.LUNES_SERVER_URL }}
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python lunes_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-debug-screenshot
          path: lunes_debug_screenshot.png
          if-no-files-found: ignore
