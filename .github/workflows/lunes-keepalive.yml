name: Lunes Host Daily KeepAlive

on:
  schedule:
    # 每天北京时间下午 4:30 自动执行一次保活打卡
    - cron: '30 8 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 安装 seleniumbase 和 requests
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          mode: client  # 指定运行官方客户端模式，避免 TUN 虚拟网卡劫持系统网络
          stack: dual

      # ====== 核心步骤：将 WARP 设为本地代理，并启动连接 ======
      - name: Configure WARP Proxy Mode
        run: |
          echo "正在将 WARP 切换至 SOCKS5 代理模式..."
          # 设置为局部代理模式
          sudo warp-cli --accept-tos mode proxy || true
          # 将本地代理端口强制指定为 40000 (默认也是这个)
          sudo warp-cli --accept-tos proxy port 40000 || sudo warp-cli --accept-tos set-proxy-port 40000 || true
          # 启动连接
          sudo warp-cli --accept-tos connect || true
          echo "等待 5 秒建立代理连接..."
          sleep 5
          # 在系统终端测试该代理是否可以正常访问网络，如果成功会显示 warp=on
          curl --socks5-hostname 127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace || true

      - name: Run check script
        env:
          LUNES_SERVER_URL: ${{ secrets.LUNES_SERVER_URL }}
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python lunes_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-debug-screenshot
          path: lunes_debug_screenshot.png
          if-no-files-found: ignore
